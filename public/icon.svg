<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="truckGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0284c7" stop-opacity="0" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />
  <rect width="500" height="500" x="6" y="6" rx="106" fill="none" stroke="#1e293b" stroke-width="12" />
  
  <!-- Cool Breeze Rings -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#0f172a" stroke-width="24" />
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#glowGrad)" stroke-width="8" stroke-dasharray="20 15" />

  <!-- Thermometer overlay / cold sign -->
  <path d="M210,130 L302,130 C310,130 315,135 315,142 L315,190 L197,190 L197,142 C197,135 202,130 210,130 Z" fill="#ffffff" opacity="0.1" />

  <!-- Truck Silhouette -->
  <g transform="translate(116, 160)">
    <!-- Cabin -->
    <path d="M190,40 L240,90 L240,160 L190,160 Z" fill="url(#truckGrad)" />
    <!-- Windshield -->
    <path d="M195,50 L225,80 L225,100 L195,100 Z" fill="#020617" opacity="0.6" />
    <!-- Container Body -->
    <rect x="0" y="20" width="180" height="140" rx="12" fill="url(#truckGrad)" />
    <!-- Metallic door stripes -->
    <line x1="15" y1="35" x2="15" y2="145" stroke="#ffffff" stroke-width="4" opacity="0.5" />
    <line x1="90" y1="35" x2="90" y2="145" stroke="#ffffff" stroke-width="4" opacity="0.3" />
    <line x1="165" y1="35" x2="165" y2="145" stroke="#ffffff" stroke-width="4" opacity="0.5" />
    
    <!-- Snowflake / Cold symbol inside container -->
    <g transform="translate(80, 90) scale(1.4)">
      <!-- Snowflake lines -->
      <line x1="-15" y1="0" x2="15" y2="0" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
      <line x1="0" y1="-15" x2="0" y2="15" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
      <line x1="-10" y1="-10" x2="10" y2="10" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
      <line x1="-10" y1="10" x2="10" y2="-10" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
      <!-- Dots -->
      <circle cx="0" cy="0" r="4.5" fill="#38bdf8" stroke="#ffffff" stroke-width="2" />
    </g>

    <!-- Wheels -->
    <circle cx="45" cy="170" r="24" fill="#020617" stroke="#38bdf8" stroke-width="6" />
    <circle cx="45" cy="170" r="8" fill="#ffffff" />
    <circle cx="135" cy="170" r="24" fill="#020617" stroke="#38bdf8" stroke-width="6" />
    <circle cx="135" cy="170" r="8" fill="#ffffff" />
    <circle cx="215" cy="170" r="24" fill="#020617" stroke="#38bdf8" stroke-width="6" />
    <circle cx="215" cy="170" r="8" fill="#ffffff" />
  </g>
  
  <!-- Glowing cool details / ice drops -->
  <circle cx="160" cy="110" r="6" fill="#38bdf8" />
  <circle cx="360" cy="115" r="8" fill="#38bdf8" />
  <circle cx="100" cy="380" r="7" fill="#38bdf8" />
  <circle cx="400" cy="360" r="5" fill="#38bdf8" />
</svg>
