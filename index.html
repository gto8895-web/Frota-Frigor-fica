<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Recuperar</title>

    <!-- PWA & Mobile Optimization -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#020617" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- iOS / Safari Settings for iPhone and iPad devices -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Recuperar" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon.png" />
    <link rel="icon" type="image/png" href="/icon.png" />
  </head>
  <body class="bg-[#020617] text-slate-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        function registerSW() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(reg) {
              console.log('Service Worker registrado com sucesso: ', reg.scope);
            })
            .catch(function(err) {
              console.error('Falha no registro do Service Worker: ', err);
            });
        }
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
          registerSW();
        } else {
          window.addEventListener('load', registerSW);
        }
      }
    </script>
  </body>
</html>
