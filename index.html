<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>RECUPERAR - GESTÃO DE FROTA</title>

    <!-- PWA & Mobile Optimization -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#020617" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- iOS / Safari Settings for iPhone 12 Pro Max -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RECUPERAR" />
    <link rel="apple-touch-icon" href="/icon.jpg" />
    <link rel="icon" type="image/jpeg" href="/icon.jpg" />
    
    <!-- Preload custom license plate font -->
    <link rel="preload" href="/fonts/FE-Schrift.ttf" as="font" type="font/ttf" crossorigin="anonymous" />
  </head>
  <body class="bg-[#020617] text-slate-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('Service Worker registrado com sucesso: ', reg.scope))
            .catch((err) => console.error('Falha no registro do Service Worker: ', err));
        });
      }
    </script>
  </body>
</html>
